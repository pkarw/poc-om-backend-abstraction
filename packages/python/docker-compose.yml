name: om-python

services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: mercato
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d mercato"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build: .
    # Applies migrations before serving (see Dockerfile CMD).
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/mercato
      REDIS_URL: redis://redis:6379
      QUEUE_STRATEGY: redis
      QUEUE_REDIS_URL: redis://redis:6379
      JWT_SECRET: dev-secret-do-not-use-in-production
      PORT: "8000"
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/healthz')"]
      interval: 10s
      timeout: 3s
      retries: 10

  worker:
    build: .
    command: ["python", "-m", "om.worker"]
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/mercato
      REDIS_URL: redis://redis:6379
      QUEUE_STRATEGY: redis
      QUEUE_REDIS_URL: redis://redis:6379
      JWT_SECRET: dev-secret-do-not-use-in-production
    depends_on:
      redis:
        condition: service_healthy
      api:
        condition: service_healthy

volumes:
  pgdata:
