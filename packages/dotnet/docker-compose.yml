name: om-dotnet

services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: mercato
      POSTGRES_PASSWORD: mercato
      POSTGRES_DB: mercato
    ports:
      - "5442:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mercato -d mercato"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6389:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build: .
    # Entrypoint applies EF Core migrations before serving (see Program.cs).
    environment:
      DATABASE_URL: postgres://mercato:mercato@postgres:5432/mercato
      REDIS_URL: redis://redis:6379
      QUEUE_STRATEGY: redis
      QUEUE_REDIS_URL: redis://redis:6379
      JWT_SECRET: dev-secret-change-me
      PORT: "8080"
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/127.0.0.1/8080"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 15s

  worker:
    build: .
    command: ["dotnet", "/app/worker/OpenMercato.Worker.dll"]
    environment:
      DATABASE_URL: postgres://mercato:mercato@postgres:5432/mercato
      REDIS_URL: redis://redis:6379
      QUEUE_STRATEGY: redis
      QUEUE_REDIS_URL: redis://redis:6379
      JWT_SECRET: dev-secret-change-me
    depends_on:
      redis:
        condition: service_healthy
      api:
        condition: service_started

volumes:
  postgres-data:
